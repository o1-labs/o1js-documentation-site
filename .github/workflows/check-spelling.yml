name: Spellcheck

on:
  pull_request:
    paths:
      - '**/*.md'
      - '**/*.mdx'
  push:
    branches: [main]

jobs:
  spellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run cspell
        run: npm run spellcheck
